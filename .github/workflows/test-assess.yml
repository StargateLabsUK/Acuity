name: Test ATMIST Assessment

on:
  push:
    paths:
      - 'supabase/functions/assess/**'
      - 'scripts/test-assess.mjs'
  pull_request:
    paths:
      - 'supabase/functions/assess/**'
      - 'scripts/test-assess.mjs'
  workflow_dispatch:

jobs:
  test-assess:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run ATMIST assessment tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/test-assess.mjs
